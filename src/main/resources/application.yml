spring:
  application:
    name: task-app

  datasource:
    url: jdbc:postgresql://localhost:5434/taskapp
    username: taskuser
    password: taskpassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  thymeleaf:
    cache: false

server:
  port: 8080

logging:
  level:
    com.example.task_app: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
